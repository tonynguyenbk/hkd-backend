<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phân Tích Sức Khỏe Tài Chính HKD — v4</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="header">
  <div class="h-logo">₫</div>
  <div>
    <div class="h-title">Sức Khỏe Tài Chính Hộ Kinh Doanh v2</div>
    <div class="h-sub">Bộ chỉ số tài chính · Khung pháp lý 2026 · Tư vấn AI</div>
  </div>
  <div id="header-user"></div>
  <div class="h-badge">v4</div>
</div>

<!-- PERIOD BAR — FIX #1 -->
<div class="period-bar">
  <span class="period-label">Kỳ phân tích:</span>
  <div class="period-pills">
    <button class="period-pill" onclick="setPeriod('thang',this)">Tháng</button>
    <button class="period-pill" onclick="setPeriod('quy',this)">Quý</button>
    <button class="period-pill active" onclick="setPeriod('nam',this)">Năm ✓ (khuyến nghị)</button>
  </div>
  <span class="period-note" id="period-note">Nhập tất cả số liệu doanh thu & chi phí theo năm. Tài sản/nợ nhập tại thời điểm hiện tại.</span>
</div>

<div class="stepper-wrap">
  <div class="stepper" id="stepper">
    <div class="step-item active" id="step-dot-0" onclick="goToStep(0)"><div class="step-circle">1</div><div class="step-label">Thông tin</div></div>
    <div class="step-item" id="step-dot-1" onclick="goToStep(1)"><div class="step-circle">2</div><div class="step-label">Doanh thu</div></div>
    <div class="step-item" id="step-dot-2" onclick="goToStep(2)"><div class="step-circle">3</div><div class="step-label">Chi phí</div></div>
    <div class="step-item" id="step-dot-3" onclick="goToStep(3)"><div class="step-circle">4</div><div class="step-label">Tài sản & Nợ</div></div>
    <div class="step-item" id="step-dot-4" onclick="goToStep(4)"><div class="step-circle">5</div><div class="step-label">Kết quả</div></div>
  </div>
</div>

<div class="main" id="main-content"></div>

<!-- External libs -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<!-- App scripts — load order matters (api → auth → charts → app) -->
<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/charts.js"></script>
<script src="assets/js/app.js"></script>

</body>
</html>
