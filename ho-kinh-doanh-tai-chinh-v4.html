<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phân Tích Sức Khỏe Tài Chính HKD — v4</title>
<style>
:root{
  --bg:#0D1B2A;--card:#162233;--card2:#1C2D41;--card3:#223349;
  --border:rgba(212,168,67,0.2);--border2:rgba(212,168,67,0.4);
  --gold:#D4A843;--gold-light:#E8C46A;--gold-dim:rgba(212,168,67,0.12);
  --safe:#22C55E;--warn:#F59E0B;--danger:#EF4444;
  --text:#F1F5F9;--muted:#94A3B8;--hint:#64748B;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.6;min-height:100vh;}

/* ── HEADER ── */
.header{background:linear-gradient(135deg,#0A1520,#162233);border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.h-logo{width:38px;height:38px;background:var(--gold);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;color:#0A1520;flex-shrink:0;}
.h-title{font-size:16px;font-weight:600;}
.h-sub{font-size:11px;color:var(--muted);}
.h-badge{margin-left:auto;background:var(--gold-dim);border:1px solid var(--border);border-radius:5px;padding:3px 9px;font-size:11px;color:var(--gold);}

/* ── PERIOD BAR ── */
.period-bar{background:var(--card2);border-bottom:1px solid var(--border);padding:10px 1.5rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.period-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.period-pills{display:flex;gap:6px;}
.period-pill{padding:5px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;}
.period-pill.active{background:var(--gold);border-color:var(--gold);color:#0A1520;}
.period-note{font-size:11px;color:var(--hint);margin-left:4px;}

/* ── STEPPER ── */
.stepper-wrap{background:var(--card);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;overflow-x:auto;}
.stepper{display:flex;align-items:center;gap:0;min-width:500px;max-width:700px;margin:0 auto;}
.step-item{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;cursor:pointer;}
.step-item:not(:last-child)::after{content:'';position:absolute;top:14px;left:calc(50% + 14px);right:calc(-50% + 14px);height:1px;background:var(--border);z-index:0;}
.step-item.done:not(:last-child)::after{background:var(--gold);}
.step-circle{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);z-index:1;transition:all .3s;}
.step-item.active .step-circle{border-color:var(--gold);background:var(--gold);color:#0A1520;}
.step-item.done .step-circle{border-color:var(--gold);background:var(--gold-dim);color:var(--gold);}
.step-label{font-size:10px;color:var(--muted);margin-top:3px;text-align:center;white-space:nowrap;}
.step-item.active .step-label{color:var(--gold);}
.step-item.done .step-label{color:var(--gold-light);}

/* ── MAIN ── */
.main{max-width:820px;margin:0 auto;padding:1.5rem 1.25rem 4rem;}

/* ── SECTION HEAD ── */
.section-head{margin-bottom:1.25rem;}
.section-head h2{font-size:18px;font-weight:700;color:var(--gold-light);display:flex;align-items:center;gap:9px;}
.section-head h2 .icon{width:32px;height:32px;border-radius:8px;background:var(--gold-dim);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;}
.section-head p{color:var(--muted);font-size:12px;margin-top:4px;}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.card-title{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.07em;margin-bottom:1rem;display:flex;align-items:center;gap:7px;}
.card-title::before{content:'';width:3px;height:13px;background:var(--gold);border-radius:2px;}

/* ── FORM ── */
.field-grid{display:grid;gap:.9rem;grid-template-columns:1fr 1fr;}
.field-grid.c3{grid-template-columns:1fr 1fr 1fr;}
.field-grid.c1{grid-template-columns:1fr;}
@media(max-width:580px){.field-grid,.field-grid.c3{grid-template-columns:1fr;}}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.field label .req{color:var(--gold);margin-left:2px;}
.field-hint{font-size:11px;color:var(--hint);line-height:1.5;}
.field-hint b{color:var(--gold-light);}
.field-example{font-size:10px;color:rgba(148,163,184,.6);font-style:italic;margin-top:2px;}

input[type=text],input[type=number],select,textarea{
  width:100%;background:rgba(10,21,32,.6);border:1px solid rgba(212,168,67,.25);
  border-radius:7px;padding:8px 11px;color:var(--text);font-size:13px;font-family:inherit;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
input:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,67,.1);}
select option{background:#162233;}
.input-wrap{position:relative;}
.input-prefix{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--muted);}
.has-prefix input{padding-left:42px;}
.input-suffix{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--hint);}
.period-unit{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--gold);font-weight:700;border:1px solid var(--border);border-radius:4px;padding:1px 5px;background:var(--gold-dim);}
.computed{background:rgba(212,168,67,.07);border:1px solid var(--border);border-radius:7px;padding:8px 11px;font-size:14px;color:var(--gold-light);font-weight:700;}

/* ── CONCEPT BANNER ── */
.concept-banner{
  background:rgba(37,99,235,.08);border:1px solid rgba(37,99,235,.25);
  border-radius:8px;padding:10px 13px;font-size:11px;color:#93C5FD;
  display:flex;gap:9px;align-items:flex-start;margin-bottom:1rem;
}
.concept-banner .ci{font-size:14px;flex-shrink:0;margin-top:1px;}

/* ── TEST CASE PANEL ── */
.tc-bar{background:var(--card3);border:1px solid var(--border);border-radius:12px;margin-bottom:1.25rem;overflow:hidden;}
.tc-header{padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.tc-header-icon{font-size:14px;}
.tc-header-title{font-size:12px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;}
.tc-header-sub{font-size:11px;color:var(--muted);margin-left:auto;}
.tc-chevron{font-size:12px;color:var(--muted);transition:transform .3s;}
.tc-bar.open .tc-chevron{transform:rotate(180deg);}
.tc-body{display:none;padding:0 14px 14px;}
.tc-bar.open .tc-body{display:block;}
.tc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;margin-top:10px;}
.tc-chip{
  background:var(--card);border:1px solid var(--border);border-radius:9px;
  padding:10px 12px;cursor:pointer;transition:all .2s;
  display:flex;gap:10px;align-items:flex-start;
}
.tc-chip:hover{border-color:var(--gold);background:var(--gold-dim);}
.tc-chip.selected{border-color:var(--gold);background:var(--gold-dim);}
.tc-chip-icon{font-size:20px;flex-shrink:0;}
.tc-chip-name{font-size:12px;font-weight:700;color:var(--text);}
.tc-chip-sub{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.4;}
.tc-chip-badge{
  display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;
  border-radius:4px;margin-top:4px;text-transform:uppercase;letter-spacing:.05em;
}
.b-safe{background:rgba(34,197,94,.15);color:var(--safe);}
.b-warn{background:rgba(245,158,11,.15);color:var(--warn);}
.b-danger{background:rgba(239,68,68,.15);color:var(--danger);}
.tc-loaded{
  background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.3);
  border-radius:8px;padding:9px 12px;font-size:12px;color:var(--safe);
  display:flex;align-items:center;gap:8px;margin-top:10px;
}

/* ── BUTTONS ── */
.btn-row{display:flex;gap:10px;margin-top:1.5rem;justify-content:flex-end;}
.btn{padding:9px 22px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;border:none;font-family:inherit;}
.btn-primary{background:var(--gold);color:#0A1520;}
.btn-primary:hover{background:var(--gold-light);}
.btn-secondary{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold);}

/* ── TAX TABLE ── */
.tax-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
.tax-table th{background:var(--gold-dim);color:var(--gold);padding:7px 10px;text-align:left;font-weight:700;}
.tax-table td{padding:6px 10px;border-top:1px solid rgba(255,255,255,.05);color:var(--muted);}
.tax-highlight{color:var(--gold-light);font-weight:700;}
.legal-box{background:rgba(10,21,32,.8);border:1px solid rgba(201,39,42,.3);border-radius:8px;padding:11px 14px;font-size:11px;color:var(--muted);margin-top:8px;}
.legal-box strong{color:#E07070;}

/* ── RESULTS ── */
.score-ring-wrap{display:flex;flex-direction:column;align-items:center;padding:1.25rem 0;}
.score-ring{position:relative;width:150px;height:150px;}
.score-ring svg{width:150px;height:150px;transform:rotate(-90deg);}
.score-ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.score-number{font-size:34px;font-weight:700;}
.score-label{font-size:10px;color:var(--muted);}
.classification-badge{display:inline-flex;align-items:center;gap:7px;padding:7px 18px;border-radius:100px;font-size:13px;font-weight:700;margin-top:10px;}
.badge-safe{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.4);color:var(--safe);}
.badge-warn{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.4);color:var(--warn);}
.badge-danger{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);color:var(--danger);}
.summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:1.25rem;}
@media(max-width:450px){.summary-row{grid-template-columns:1fr;}}
.summary-tile{background:var(--card2);border-radius:9px;padding:12px;text-align:center;border:1px solid var(--border);}
.summary-tile-val{font-size:18px;font-weight:700;color:var(--gold-light);}
.summary-tile-label{font-size:10px;color:var(--muted);margin-top:2px;}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.metric-card{background:var(--card2);border-radius:9px;padding:12px;border-left:3px solid;}
.metric-card.safe{border-color:var(--safe);}
.metric-card.warn{border-color:var(--warn);}
.metric-card.danger{border-color:var(--danger);}
.metric-name{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.metric-value{font-size:20px;font-weight:700;margin:3px 0 1px;}
.metric-card.safe .metric-value{color:var(--safe);}
.metric-card.warn .metric-value{color:var(--warn);}
.metric-card.danger .metric-value{color:var(--danger);}
.metric-bench{font-size:10px;color:var(--muted);}
.metric-status{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:2px 7px;border-radius:3px;display:inline-block;margin-top:5px;}
.safe .metric-status{background:rgba(34,197,94,.15);color:var(--safe);}
.warn .metric-status{background:rgba(245,158,11,.15);color:var(--warn);}
.danger .metric-status{background:rgba(239,68,68,.15);color:var(--danger);}

/* tabs */
.tabs{display:flex;gap:4px;margin-bottom:1.25rem;flex-wrap:wrap;}
.tab{padding:6px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid transparent;color:var(--muted);background:transparent;font-family:inherit;transition:all .2s;}
.tab.active{background:var(--gold-dim);border-color:var(--border);color:var(--gold);}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* roadmap */
.roadmap-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.roadmap-item:last-child{border-bottom:none;}
.roadmap-num{width:26px;height:26px;border-radius:50%;background:var(--gold-dim);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--gold);flex-shrink:0;}
.roadmap-title{font-size:12px;font-weight:700;color:var(--text);}
.roadmap-desc{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.5;}
.roadmap-tag{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;margin-top:5px;}
.tag-urgent{background:rgba(239,68,68,.15);color:var(--danger);}
.tag-medium{background:rgba(245,158,11,.15);color:var(--warn);}
.tag-long{background:rgba(34,197,94,.15);color:var(--safe);}

/* ai */
.ai-box{background:var(--gold-dim);border:1px solid rgba(212,168,67,.25);border-radius:12px;padding:1.25rem;}
.ai-header{display:flex;align-items:center;gap:9px;margin-bottom:1rem;font-size:13px;font-weight:700;color:var(--gold-light);}
.ai-pulse{width:9px;height:9px;border-radius:50%;background:var(--gold);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.85);}}
.ai-content{font-size:13px;line-height:1.8;color:var(--text);white-space:pre-wrap;}
.ai-loading{color:var(--muted);font-size:12px;font-style:italic;}

.chart-wrap{position:relative;width:100%;height:260px;}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:1.25rem 0;}
.fade-in{animation:fadeIn .35s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.disclaimer{font-size:10px;color:rgba(148,163,184,.5);text-align:center;margin-top:1.5rem;line-height:1.7;}

/* field highlight when loaded */
input.loaded-val{border-color:rgba(34,197,94,.5)!important;background:rgba(34,197,94,.04)!important;}

/* ── AUTH MODAL ─────────────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center;}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem;width:min(420px,92vw);position:relative;}
.modal-title{font-size:18px;font-weight:700;color:var(--gold-light);margin-bottom:1.5rem;}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;}
.auth-tabs{display:flex;gap:4px;margin-bottom:1.25rem;}
.auth-tab{flex:1;padding:8px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;transition:all .2s;}
.auth-tab.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);}
.auth-form{display:flex;flex-direction:column;gap:12px;}
.auth-form input{padding:10px 12px;border-radius:8px;border:1px solid rgba(212,168,67,.3);background:rgba(10,21,32,.7);color:var(--text);font-size:13px;font-family:inherit;outline:none;}
.auth-form input:focus{border-color:var(--gold);}
.auth-err{font-size:12px;color:var(--danger);padding:8px 12px;background:rgba(239,68,68,.1);border-radius:6px;}
.auth-ok{font-size:12px;color:var(--safe);padding:8px 12px;background:rgba(34,197,94,.1);border-radius:6px;}
/* user chip in header */
.user-chip{display:flex;align-items:center;gap:8px;background:var(--gold-dim);border:1px solid var(--border);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:12px;color:var(--gold-light);}
.user-chip:hover{border-color:var(--gold);}
</style>
</head>
<body>

<div class="header">
  <div class="h-logo">₫</div>
  <div>
    <div class="h-title">Sức Khỏe Tài Chính Hộ Kinh Doanh v2</div>
    <div class="h-sub">Bộ chỉ số tài chính · Khung pháp lý 2026 · Tư vấn AI</div>
  </div>
  <div id="header-user"></div>
  <div class="h-badge">v4</div>
</div>

<!-- PERIOD BAR — FIX #1 -->
<div class="period-bar">
  <span class="period-label">Kỳ phân tích:</span>
  <div class="period-pills">
    <button class="period-pill" onclick="setPeriod('thang',this)">Tháng</button>
    <button class="period-pill" onclick="setPeriod('quy',this)">Quý</button>
    <button class="period-pill active" onclick="setPeriod('nam',this)">Năm ✓ (khuyến nghị)</button>
  </div>
  <span class="period-note" id="period-note">Nhập tất cả số liệu doanh thu & chi phí theo năm. Tài sản/nợ nhập tại thời điểm hiện tại.</span>
</div>

<div class="stepper-wrap">
  <div class="stepper" id="stepper">
    <div class="step-item active" id="step-dot-0" onclick="goToStep(0)"><div class="step-circle">1</div><div class="step-label">Thông tin</div></div>
    <div class="step-item" id="step-dot-1" onclick="goToStep(1)"><div class="step-circle">2</div><div class="step-label">Doanh thu</div></div>
    <div class="step-item" id="step-dot-2" onclick="goToStep(2)"><div class="step-circle">3</div><div class="step-label">Chi phí</div></div>
    <div class="step-item" id="step-dot-3" onclick="goToStep(3)"><div class="step-circle">4</div><div class="step-label">Tài sản & Nợ</div></div>
    <div class="step-item" id="step-dot-4" onclick="goToStep(4)"><div class="step-circle">5</div><div class="step-label">Kết quả</div></div>
  </div>
</div>

<div class="main" id="main-content"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
/* ══════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════ */
let currentStep = 0;
let period = 'nam'; // thang | quy | nam
let radarChart = null, barChart = null;
let loadedCase = null;

const data = {
  info:    { name:'', industry:'thuong_mai', size:'sieu_nho', duration:'', province:'', region:'tinh_lon' },
  revenue: { tongDoanhThu:0, giaVon:0, thuNhapKhac:0 },
  expenses:{ thueMatBang:0, nhanCong:0, chiPhiKhac:0, thueNopTrongKy:0 },
  assets:  { tienMat:0, hangTonKho:0, phaiThu:0, taiSanCoDinh:0,
             noNganHan:0, noDaiHan:0, vonChuSoHuu:0 }  // FIX #2: nợ chuyển vào assets (bảng cân đối)
};

/* ══════════════════════════════════════════════════════
   PERIOD HELPERS — FIX #1
══════════════════════════════════════════════════════ */

/* ══════════════════════════════════════════════════════
   BACKEND API CONFIG
   Đổi API_BASE sang URL server thật khi deploy
══════════════════════════════════════════════════════ */
const API_BASE = window.location.hostname === 'localhost' ||
                 window.location.hostname === '127.0.0.1' ||
                 window.location.protocol === 'file:'
  ? 'http://localhost:3000'
  : 'https://hkd-backend-production.up.railway.app';
/* ── Auth state ─────────────────────────────────────── */
let authState = {
  user:         JSON.parse(localStorage.getItem('hkd_user')||'null'),
  accessToken:  localStorage.getItem('hkd_access')||'',
  refreshToken: localStorage.getItem('hkd_refresh')||'',
  hkdProfiles:  [],
  activeHkdId:  localStorage.getItem('hkd_active_id')||''
};

function saveAuth(user, accessToken, refreshToken) {
  authState.user = user;
  authState.accessToken = accessToken;
  authState.refreshToken = refreshToken;
  localStorage.setItem('hkd_user',    JSON.stringify(user));
  localStorage.setItem('hkd_access',  accessToken);
  localStorage.setItem('hkd_refresh', refreshToken);
  /* Tự load HKD profile đầu tiên sau khi login */
  setTimeout(async () => {
    await loadHkdProfiles();
    if (authState.hkdProfiles.length > 0 && !authState.activeHkdId) {
      authState.activeHkdId = authState.hkdProfiles[0].id;
      localStorage.setItem('hkd_active_id', authState.activeHkdId);
    }
  }, 300);
}

function clearAuth() {
  authState = { user:null, accessToken:'', refreshToken:'', hkdProfiles:[], activeHkdId:'' };
  ['hkd_user','hkd_access','hkd_refresh','hkd_active_id'].forEach(k=>localStorage.removeItem(k));
}

function isLoggedIn() { return !!authState.user && !!authState.accessToken; }

/* ── API fetch wrapper (auto refresh token) ──────────── */
async function apiFetch(path, opts={}) {
  if (!authState.accessToken && !path.includes('/auth/')) {
    showAuthModal(); throw new Error('Chưa đăng nhập');
  }
  const headers = { 'Content-Type':'application/json', ...(opts.headers||{}) };
  if (authState.accessToken) headers['Authorization'] = 'Bearer ' + authState.accessToken;

  let res = await fetch(API_BASE + path, { ...opts, headers });

  /* Token hết hạn → thử refresh */
  if (res.status === 401 && authState.refreshToken) {
    const refreshRes = await fetch(API_BASE + '/api/auth/refresh', {
      method: 'POST',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({ refreshToken: authState.refreshToken })
    });
    if (refreshRes.ok) {
      const { accessToken } = await refreshRes.json();
      authState.accessToken = accessToken;
      localStorage.setItem('hkd_access', accessToken);
      headers['Authorization'] = 'Bearer ' + accessToken;
      res = await fetch(API_BASE + path, { ...opts, headers });
    } else {
      clearAuth(); showAuthModal(); throw new Error('Phiên hết hạn');
    }
  }
  return res;
}

function closeAuthModal() { const m=document.getElementById('auth-modal'); if(m) m.remove(); }

function switchAuthTab(tab, btn) {
  document.querySelectorAll('.auth-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('auth-login').style.display = tab==='login'?'block':'none';
  document.getElementById('auth-register').style.display = tab==='register'?'block':'none';
}

function continueOffline() { closeAuthModal(); }

async function doLogin() {
  const email = document.getElementById('al-email').value.trim();
  const pass  = document.getElementById('al-pass').value;
  const msg   = document.getElementById('al-msg');
  msg.innerHTML = '<span style="color:var(--muted)">Đang đăng nhập...</span>';
  try {
    const res = await fetch(API_BASE+'/api/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password:pass})
    });
    const data = await res.json();
    if (!res.ok) { msg.innerHTML = `<div class="auth-err">${data.error}</div>`; return; }
    saveAuth(data.user, data.accessToken, data.refreshToken);
    closeAuthModal();
    updateHeaderUserChip();
    await loadHkdProfiles();
  } catch(e) {
    msg.innerHTML = `<div class="auth-err">Lỗi kết nối server. Thử lại sau.</div>`;
  }
}

async function doRegister() {
  const name  = document.getElementById('ar-name').value.trim();
  const email = document.getElementById('ar-email').value.trim();
  const pass  = document.getElementById('ar-pass').value;
  const msg   = document.getElementById('ar-msg');
  msg.innerHTML = '<span style="color:var(--muted)">Đang tạo tài khoản...</span>';
  try {
    const res = await fetch(API_BASE+'/api/auth/register', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password:pass, full_name:name})
    });
    const data = await res.json();
    if (!res.ok) { msg.innerHTML = `<div class="auth-err">${data.error}</div>`; return; }
    saveAuth(data.user, data.accessToken, data.refreshToken);
    closeAuthModal();
    updateHeaderUserChip();
  } catch(e) {
    msg.innerHTML = `<div class="auth-err">Lỗi kết nối server. Thử lại sau.</div>`;
  }
}

async function doLogout() {
  try {
    await apiFetch('/api/auth/logout', {method:'POST', body:JSON.stringify({refreshToken:authState.refreshToken})});
  } catch {}
  clearAuth();
  updateHeaderUserChip();
  renderCurrentStep();
}

function updateHeaderUserChip() {
  const existing = document.getElementById('header-user');
  if (!existing) return;
  if (isLoggedIn()) {
    existing.innerHTML = `<div class="user-chip" onclick="doLogout()" title="Bấm để đăng xuất">

}

async function saveSnapshotRemote(snap, hkd_id) {
  if (!isLoggedIn() || !hkd_id) return null;
  try {
    const res = await apiFetch('/api/analysis', {
      method: 'POST',
      body: JSON.stringify({
        hkd_id,
        period:           snap.period,
        period_label:     snap.periodLabel,
        score:            snap.score,
        classification:   snap.score>=70?'safe':snap.score>=40?'warn':'danger',
        input_revenue:    snap.data.revenue,
        input_expenses:   snap.data.expenses,
        input_assets:     snap.data.assets,
        ratios:           snap.ratios,
        summary:          snap.summary,
        import_source:    snap.importSource||'manual'
      })
    });
    if (res.ok) { const d = await res.json(); return d.analysis?.id; }
  } catch {}
  return null;
}

function calculate() {
  const r=data.revenue, e=data.expenses, a=data.assets;
  const ind=INDUSTRIES[data.info.industry];
  const mult=PERIOD_MULT[period];

  // Convert period→annual for tax threshold
  const dtNam   = annualize(r.tongDoanhThu);
  const gvNam   = annualize(r.giaVon);
  const thuNam  = annualize(r.thuNhapKhac);
  const mbNam   = annualize(e.thueMatBang);
  const lcNam   = annualize(e.nhanCong);
  const cpkNam  = annualize(e.chiPhiKhac);
  const thueNam = annualize(e.thueNopTrongKy);

  const lnGop  = dtNam - gvNam;
  const cpHD   = mbNam + lcNam + cpkNam;
  const lnRong = lnGop - cpHD + thuNam;

  // FIX #2: nợ từ assets section (bảng cân đối)
  const noNH   = +a.noNganHan||0;
  const noDH   = +a.noDaiHan||0;
  const tongNo = noNH + noDH;
  const vonCSH = +a.vonChuSoHuu||1;
  const tienMat= +a.tienMat||0;
  const htk    = +a.hangTonKho||0;
  const pt     = +a.phaiThu||0;
  const tscd   = +a.taiSanCoDinh||0;
  const tsNH   = tienMat+htk+pt;
  const tongTS = tsNH+tscd;

  // FIX #1: tax threshold uses annualized DT
  const ngưỡngChịuThuế = 500; // 2026: trên 500tr phải nộp
  const thueGTGT_expect = dtNam>ngưỡngChịuThuế ? dtNam*ind.gtgt/100 : 0;
  const thueTNCN_expect = dtNam>ngưỡngChịuThuế ? dtNam*ind.tncn/100 : 0;
  const tongThue_expect = thueGTGT_expect+thueTNCN_expect;

  const reg = REGION_BENCHMARKS[data.info.region||'tinh_lon'];
  const margBench = INDUSTRY_MARGIN[data.info.industry]?.[data.info.region||'tinh_lon'] || ind.marginBench;

  const ratios = {
    tanhoan_htl:   noNH>0 ? tsNH/noNH : 99,
    tanhoan_nhanh: noNH>0 ? (tienMat+pt)/noNH : 99,
    bien_ln_gop:   dtNam>0 ? lnGop/dtNam*100 : 0,
    bien_ln_rong:  dtNam>0 ? lnRong/dtNam*100 : 0,
    no_von:        vonCSH>0 ? tongNo/vonCSH : 0,
    vq_htk:        htk>0 ? dtNam/htk : 99,
    cp_dt:         dtNam>0 ? cpHD/dtNam*100 : 0,
    tu_tai_tro:    tongTS>0 ? vonCSH/tongTS : 0,
    tuan_thu_thue: tongThue_expect>0 ? thueNam/tongThue_expect : (thueNam>0?1:0),
    mb_dt:         dtNam>0 ? mbNam/dtNam*100 : 0
  };

  /* Ghi đè ngưỡng theo vùng cho 2 chỉ số địa lý */
  ratios._reg = reg;
  ratios._margBench = margBench;

  return {ratios, summary:{dtNam,lnGop,lnRong,cpHD,tongNo,tongTS,vonCSH,
    tongThue_expect,thueNam,tsNH,noNH,ind,mbNam,reg,margBench}};
}

/* ══════════════════════════════════════════════════════

══════════════════════════════════════════════════════ */
const METRICS_DEF = [
  {key:'tanhoan_htl',   label:'Thanh khoản hiện thời', format:v=>v>=99?'N/A':v.toFixed(2)+' lần', thresholds:[1.0,1.5],inverse:false,radarMax:3,   bench:'≥ 1.5: An toàn | 1.0–1.5: Cần cải thiện | < 1.0: Nguy cơ cao',info:'TSNH / Nợ ngắn hạn',improve:'Tăng tiền mặt dự trữ, đàm phán gia hạn nợ nhà cung cấp.'},
  {key:'tanhoan_nhanh', label:'Thanh khoản nhanh',     format:v=>v>=99?'N/A':v.toFixed(2)+' lần', thresholds:[0.5,1.0],inverse:false,radarMax:2,   bench:'≥ 1.0: An toàn | 0.5–1.0: Cần cải thiện | < 0.5: Nguy cơ cao',info:'(Tiền + Phải thu) / Nợ NH',improve:'Đẩy nhanh thu hồi công nợ khách hàng, lập quỹ tiền mặt dự phòng.'},
  {key:'bien_ln_gop',   label:'Biên LN gộp',           format:v=>v.toFixed(1)+'%',                 thresholds:[15,25],  inverse:false,radarMax:60,  bench:'≥ 25%: An toàn | 15–25%: Cần cải thiện | < 15%: Nguy cơ cao',info:'LN gộp / Doanh thu × 100',improve:'Tối ưu giá vốn, đàm phán nhà cung cấp, cải thiện mix sản phẩm.'},
  {key:'bien_ln_rong',  label:'Biên LN ròng',           format:v=>v.toFixed(1)+'%',                 thresholds:[5,10],   inverse:false,radarMax:30,  bench:'≥ 10%: An toàn | 5–10%: Cần cải thiện | < 5%: Nguy cơ cao',info:'LN ròng / Doanh thu × 100',improve:'Kiểm soát chặt chi phí vận hành, cắt giảm khoản không hiệu quả.'},
  {key:'no_von',        label:'Hệ số Nợ/Vốn (D/E)',    format:v=>v>=99?'N/A':v.toFixed(2),         thresholds:[1.0,2.0],inverse:true, radarMax:4,   bench:'≤ 1.0: An toàn | 1.0–2.0: Cần cải thiện | > 2.0: Nguy cơ cao',info:'Tổng nợ / Vốn chủ sở hữu',improve:'Ưu tiên trả nợ, hạn chế vay mới, tăng vốn từ lợi nhuận giữ lại.'},
  {key:'vq_htk',        label:'Vòng quay HTK',          format:v=>v>=99?'N/A':v.toFixed(1)+' lần', thresholds:[4,8],    inverse:false,radarMax:16,  bench:'≥ 8 lần: An toàn | 4–8 lần: Cần cải thiện | < 4 lần: Nguy cơ cao',info:'Doanh thu / Hàng tồn kho',improve:'Áp dụng JIT, thanh lý hàng chậm bán, tối ưu đặt hàng.'},
  {key:'cp_dt',         label:'Chi phí HĐ / DT',        format:v=>v.toFixed(1)+'%',                 thresholds:[20,30],  inverse:true, radarMax:60,  bench:'≤ 20%: An toàn | 20–30%: Cần cải thiện | > 30%: Nguy cơ cao',info:'Chi phí hoạt động / Doanh thu × 100',improve:'Cắt giảm chi phí cố định, thuê mặt bằng rẻ hơn, tối ưu nhân sự.'},
  {key:'tu_tai_tro',    label:'Hệ số tự tài trợ',      format:v=>(v*100).toFixed(1)+'%',           thresholds:[0.3,0.5],inverse:false,radarMax:1,   bench:'≥ 50%: An toàn | 30–50%: Cần cải thiện | < 30%: Nguy cơ cao',info:'Vốn CSH / Tổng tài sản × 100',improve:'Tăng vốn tự có, giảm phụ thuộc vào nợ vay.'},
  {key:'tuan_thu_thue', label:'Tuân thủ thuế',          format:v=>Math.min(v*100,100).toFixed(0)+'%', thresholds:[0.7,0.9],inverse:false,radarMax:1.2,bench:'≥ 90%: An toàn | 70–90%: Cần cải thiện | < 70%: Nguy cơ cao',info:'Thuế đã nộp / Thuế dự kiến (năm)',improve:'Trích lập quỹ thuế hàng tháng theo tỷ lệ doanh thu.'},
  {key:'mb_dt',         label:'Thuê MB / Doanh thu',    format:v=>v.toFixed(1)+'%',                 thresholds:[10,15],  inverse:true, radarMax:40,  bench:'≤ 10%: An toàn | 10–15%: Cần cải thiện | > 15%: Nguy cơ cao',info:'Thuê mặt bằng / Doanh thu × 100',improve:'Đàm phán giảm tiền thuê hoặc dời địa điểm.'}
];

function classify(v,th,inv){
  if(inv){if(v<=th[0])return'safe';if(v<=th[1])return'warn';return'danger';}
  else   {if(v>=th[1])return'safe';if(v>=th[0])return'warn';return'danger';}
}
function scoreAll(ratios){
  let t=0,c=0;
  METRICS_DEF.forEach(m=>{const st=classify(ratios[m.key],m.thresholds,m.inverse);t+=(st==='safe'?100:st==='warn'?55:15);c++;});
  return c>0?Math.round(t/c):0;
}
function overallClass(s){return s>=70?'safe':s>=40?'warn':'danger';}

function buildRoadmap(dangerM,warnM,ratios){
  let items=[],i=1;
  for(const m of dangerM) items.push(`<div class="roadmap-item"><div class="roadmap-num">${i++}</div><div>
    <div class="roadmap-title">[Ưu tiên cao] ${m.label}: ${m.format(ratios[m.key])}</div>
    <div class="roadmap-desc">${m.improve}</div><span class="roadmap-tag tag-urgent">Xử lý ngay 1–4 tuần</span></div></div>`);
  for(const m of warnM) items.push(`<div class="roadmap-item"><div class="roadmap-num">${i++}</div><div>
    <div class="roadmap-title">[Cần cải thiện] ${m.label}: ${m.format(ratios[m.key])}</div>
    <div class="roadmap-desc">${m.improve}</div><span class="roadmap-tag tag-medium">1–3 tháng</span></div></div>`);
  items.push(`<div class="roadmap-item"><div class="roadmap-num">${i++}</div><div>
    <div class="roadmap-title">Lập sổ kế toán theo TT 152/2025/TT-BTC</div>
    <div class="roadmap-desc">Từ 1/1/2026, hộ kê khai phải ghi sổ doanh thu, tồn kho, dòng tiền. Dùng phần mềm kế toán đơn giản hoặc thuê kế toán dịch vụ.</div>
    <span class="roadmap-tag tag-long">Chiến lược dài hạn</span></div></div>`);
  if(items.length===1) items=[`<div style="text-align:center;padding:2rem;color:var(--safe)">✓ Chúc mừng! Tài chính đang rất tốt. Duy trì và tiếp tục phát triển!</div>`,...items];
  return items.join('');
}

function fmt(v){return (Math.round((v||0)*10)/10).toFixed(1);}

function switchTab(id,btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  if(id==='t-chart') renderCharts();
}

function updateRevCalc(){
  const el=document.getElementById('calc-ln-gop');
  if(!el)return;
  const ln=annualize(data.revenue.tongDoanhThu)-annualize(data.revenue.giaVon);
  const dtNam=annualize(data.revenue.tongDoanhThu);
  const pct=dtNam>0?(ln/dtNam*100).toFixed(1):0;
  el.textContent=`₫${fmt(ln)} triệu/năm (${pct}%)`;
  el.style.color=ln>=0?'var(--gold-light)':'var(--danger)';
}

function renderCharts(){
  const {ratios}=calculate();
  if(radarChart){radarChart.destroy();radarChart=null;}
  if(barChart){barChart.destroy();barChart=null;}
  const radarVals=METRICS_DEF.map(m=>{
    let v=ratios[m.key];
    if(v>=99) v=m.radarMax; // clamp N/A sentinel so it doesn't blow past 100%
    const clamped=Math.min(Math.abs(v),m.radarMax);
    return m.inverse
      ?Math.max(0,Math.min(100,100-(clamped/m.radarMax)*100))
      :Math.max(0,Math.min(100,(clamped/m.radarMax)*100));
  });
  const statusColors=METRICS_DEF.map(m=>{
    const st=classify(ratios[m.key],m.thresholds,m.inverse);
    return st==='safe'?'#22C55E':st==='warn'?'#F59E0B':'#EF4444';
  });
  const scores=METRICS_DEF.map(m=>{const st=classify(ratios[m.key],m.thresholds,m.inverse);return st==='safe'?100:st==='warn'?55:15;});
  const rCtx=document.getElementById('radar-chart');

/* ── API KEY CONFIG ──────────────────────────────────────
   Khi chạy trên Claude.ai  : key được inject tự động, không cần điền.
   Khi chạy local / server  : điền key của bạn vào dòng dưới.
   Lấy key tại: https://console.anthropic.com/settings/keys
   CẢNH BÁO: Không commit/share file nếu đã điền key thật.
─────────────────────────────────────────────────────── */
const LOCAL_API_KEY = '';   // ← điền key ở đây nếu chạy local, VD: 'sk-ant-...'

async function fetchAI(res){
  const {ratios,summary}=res;
  const ind=INDUSTRIES[data.info.industry];
  const dList=METRICS_DEF.filter(m=>classify(ratios[m.key],m.thresholds,m.inverse)==='danger').map(m=>`${m.label}: ${m.format(ratios[m.key])}`).join(', ')||'Không có';
  const wList=METRICS_DEF.filter(m=>classify(ratios[m.key],m.thresholds,m.inverse)==='warn').map(m=>`${m.label}: ${m.format(ratios[m.key])}`).join(', ')||'Không có';
  const prompt=`Bạn là chuyên gia tư vấn tài chính cho hộ kinh doanh Việt Nam. Phân tích ngắn gọn, thực tế.
HKD: ${data.info.name||'Không cung cấp'} | Ngành: ${ind.label}
DT năm: ${fmt(summary.dtNam)} triệu | LN ròng: ${fmt(summary.lnRong)} triệu | Tổng nợ: ${fmt(summary.tongNo)} triệu
Chỉ số nguy cơ cao: ${dList}
Chỉ số cần cải thiện: ${wList}
Điểm sức khỏe: ${scoreAll(ratios)}/100
Viết phân tích 250–350 từ bằng tiếng Việt: (1) Nhận xét tổng quan, (2) 3 điểm mạnh, (3) 3 rủi ro cần xử lý ngay, (4) Khuyến nghị chiến lược cụ thể cho quy mô HKD nhỏ tại Việt Nam 2026.`;

  /* Phát hiện môi trường */
  const isClaudeAI = window.location.hostname.includes('claude.ai') ||
                     window.location.protocol === 'blob:' ||
                     window.location.href.includes('claude');
  const key = LOCAL_API_KEY.trim();

  /* Nếu không có key và không phải Claude.ai → hiện hướng dẫn thay vì lỗi */
  if(!key && !isClaudeAI){
    return [
      '⚠️ Tính năng Tư vấn AI không hoạt động khi chạy file local vì cần API key.',
      '',
      'Cách kích hoạt:',
      '1. Lấy API key miễn phí tại https://console.anthropic.com/settings/keys',
      '2. Mở file HTML bằng text editor',
      '3. Tìm dòng: const LOCAL_API_KEY = (trống)',
      '4. Điền key vào: const LOCAL_API_KEY = \'sk-ant-xxxxx\'',
      '5. Lưu và mở lại file trong trình duyệt',
      '',
      'Hoặc deploy lên server và gọi API từ backend để bảo mật key hơn.',
      '',
      '📊 Các chức năng phân tích còn lại (10 chỉ số, biểu đồ, lộ trình) hoạt động bình thường không cần API key.'
    ].join('\n');
  }

  try{
    const headers = {'Content-Type':'application/json'};
    if(key) headers['x-api-key'] = key;
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers,
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})
    });
    if(!resp.ok){
      const err=await resp.json().catch(()=>({}));
      const msg=err?.error?.message||resp.statusText;
      if(resp.status===401) return '❌ API key không hợp lệ. Kiểm tra lại key tại console.anthropic.com';
      if(resp.status===429) return '⏳ Vượt giới hạn request. Thử lại sau vài giây.';
      return `❌ Lỗi API (${resp.status}): ${msg}`;
    }
    const json=await resp.json();
    return json.content?.[0]?.text||'Không thể lấy kết quả từ AI.';
  }catch(e){
    if(e.message&&e.message.includes('CORS')){
      return '❌ CORS error: Trình duyệt chặn request từ file local. Xem hướng dẫn điền API key bên dưới.\n\n→ Mở file HTML, tìm LOCAL_API_KEY và điền key của bạn vào.';
    }
    return `❌ Lỗi kết nối: ${e.message||'Không xác định'}. Kiểm tra internet và thử lại.`;
  }
}

/* ══════════════════════════════════════════════════════
   PERIOD HISTORY — localStorage
   Key: hkd_history_{name} → array of snapshots
   Snapshot: { period, date, data, ratios, score, summary }
══════════════════════════════════════════════════════ */
const HISTORY_KEY = () => 'hkd_v1_' + (data.info.name||'default').replace(/\s+/g,'_').toLowerCase();

function saveSnapshot(res) {
  if(!data.info.name) return;
  const snap = {
    id: Date.now(),
    savedAt: new Date().toLocaleDateString('vi-VN'),
    period,
    periodLabel: PERIOD_LABEL[period],
    score: scoreAll(res.ratios),
    name: data.info.name,
    industry: data.info.industry,
    region: data.info.region||'tinh_lon',
    data: JSON.parse(JSON.stringify(data)),
    summary: {
      dtNam: res.summary.dtNam,
      lnGop: res.summary.lnGop,
      lnRong: res.summary.lnRong,
      tongNo: res.summary.tongNo,
      tongTS: res.summary.tongTS
    },
    ratios: Object.fromEntries(Object.entries(res.ratios).filter(([k])=>!k.startsWith('_')))
  };
  try {
    const key = HISTORY_KEY();
    const existing = JSON.parse(localStorage.getItem(key)||'[]');
    existing.unshift(snap);
    const trimmed = existing.slice(0,24); // giữ tối đa 24 kỳ
    localStorage.setItem(key, JSON.stringify(trimmed));
    return snap;
  } catch(e) { console.warn('localStorage save failed:', e); return null; }
}

function loadHistory() {
  try {
    const key = HISTORY_KEY();
    return JSON.parse(localStorage.getItem(key)||'[]');
  } catch(e) { return []; }
}

function clearHistory() {
  try { localStorage.removeItem(HISTORY_KEY()); } catch(e){}
}

function getPrevSnapshot() {
  const h = loadHistory();
  return h.length > 1 ? h[1] : null;
}

function renderDelta(curr, prev, key, fmt, inverse=false) {
  if(!prev||prev.ratios[key]===undefined) return '<span style="color:var(--hint);font-size:10px">—</span>';
  const delta = curr - prev.ratios[key];
  if(Math.abs(delta) < 0.01) return '<span style="color:var(--hint);font-size:10px">= Không đổi</span>';
  const better = inverse ? delta < 0 : delta > 0;
  const color = better ? 'var(--safe)' : 'var(--danger)';
  const sign = delta > 0 ? '+' : '';
  return `<span style="color:${color};font-size:10px;font-weight:600">${sign}${fmt(delta)} so kỳ trước</span>`;
}

/* ── Excel / CSV parser (dùng SheetJS nếu có, fallback CSV) ── */
function parseExcelFile(file, callback) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      if(typeof XLSX !== 'undefined') {
        const wb = XLSX.read(e.target.result, {type:'binary'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        callback(null, rows);
      } else {
        /* Fallback: read as text CSV */
        const text = new TextDecoder('utf-8').decode(new Uint8Array(e.target.result));
        const rows = text.split('\n').map(r=>r.split(',').map(v=>v.trim().replace(/^"|"$/g,'')));
        callback(null, rows);
      }
    } catch(err) { callback(err.message, null); }
  };
  reader.readAsBinaryString(file);
}

/* ── Map Excel rows to data fields ── */
function mapExcelToData(rows) {
  /* 
    Định dạng template:
    Hàng 1: header (bỏ qua)
    Tìm theo nhãn ở cột A, giá trị ở cột B
    Hỗ trợ export từ Misa SME, Fast, và template tự tạo
  */
  const map = {};
  rows.forEach(row => {
    if(!row[0]) return;
    const key = String(row[0]).toLowerCase().trim()
      .replace(/[àáạảã]/g,'a').replace(/[èéẹẻẽ]/g,'e')
      .replace(/[ìíịỉĩ]/g,'i').replace(/[òóọỏõôốồổỗộơờớởỡợ]/g,'o')
      .replace(/[ùúụủũưứừửữự]/g,'u').replace(/[ỳýỵỷỹ]/g,'y')
      .replace(/đ/g,'d').replace(/[^a-z0-9\s]/g,'').trim();
    const val = parseFloat(String(row[1]||'').replace(/[^0-9.-]/g,'')) || 0;
    map[key] = val;
  });

  const get = (...keys) => {
    for(const k of keys) { if(map[k]!==undefined && map[k]!==0) return map[k]; }
    return 0;
  };

  return {
    revenue: {
      tongDoanhThu: get('tong doanh thu','doanh thu','revenue','dt'),
      giaVon:       get('gia von','chi phi truc tiep','cogs','gia von hang ban'),
      thuNhapKhac:  get('thu nhap khac','other income','thu khac')
    },
    expenses: {
      thueMatBang:    get('thue mat bang','tien thue','mat bang','rent'),
      nhanCong:       get('nhan cong','tien luong','luong','salary','wages'),
      chiPhiKhac:     get('chi phi khac','other expense','cp khac','van hanh'),
      thueNopTrongKy: get('thue da nop','thue gtgt tncn','tax paid','thue')
    },
    assets: {
      tienMat:      get('tien mat','cash','tien','tien gui'),
      hangTonKho:   get('hang ton kho','inventory','ton kho','htk'),
      phaiThu:      get('phai thu','receivable','cong no phai thu'),
      taiSanCoDinh: get('tai san co dinh','fixed asset','tscd','may moc'),
      noNganHan:    get('no ngan han','current liab','vay ngan han','no nh'),
      noDaiHan:     get('no dai han','long term','vay dai han','no dh'),
      vonChuSoHuu:  get('von chu so huu','equity','von csh','von tu co')
    }
  };
}

/* ── HTKK XML parser ── */
function parseHTKKXml(xmlText) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlText, 'text/xml');
  const get = (tag) => {
    const el = doc.querySelector(tag) || doc.querySelector('[ten="'+tag+'"]');
    return el ? parseFloat(el.textContent.replace(/[^0-9.-]/g,''))||0 : 0;
  };
  const getText = (tag) => {
    const el = doc.querySelector(tag);
    return el ? el.textContent.trim() : '';
  };

  /* Mẫu 01/CNKD — Tờ khai thuế GTGT và TNCN hộ kinh doanh */
  /* Các trường theo phụ lục TT18/2026/TT-BTC */
  const doanhThu = get('DoanhThu') || get('TongDoanhThu') || get('dt') || get('DTTB');
  const thueGTGT  = get('ThuGTGT')  || get('ThueGTGT')   || get('t_gtgt');
  const thueTNCN  = get('ThueTNCN') || get('ThuTNCN')    || get('t_tncn');
  const tongThue  = (thueGTGT + thueTNCN) || get('TongThuPhaiNop');
  const tenHKD    = getText('TenNguoiNopThue') || getText('TenHKD') || getText('ten_nnt') || '';
  const mst       = getText('MST') || getText('MaSoThue') || '';
  const kyKhai    = getText('KyTinh') || getText('KyKhaiThue') || '';

  /* Đơn vị trong HTKK: đồng → triệu */
  const toMil = v => v >= 1000 ? +(v/1000000).toFixed(2) : v;

  return {
    tenHKD, mst, kyKhai,
    doanhThu: toMil(doanhThu),
    thueGTGT: toMil(thueGTGT),
    thueTNCN: toMil(thueTNCN),
    tongThue:  toMil(tongThue),
    raw: { doanhThu, thueGTGT, thueTNCN, tongThue }
  };
}

            style="width:100%;padding:8px;border-radius:6px;border:1px dashed rgba(212,168,67,0.4);background:transparent;color:var(--gold);font-size:12px;cursor:pointer;font-family:inherit">
            Chọn file Excel / CSV
          </button>
          <div id="excel-result" style="margin-top:8px;font-size:11px;color:var(--muted)"></div>
          <div style="margin-top:10px;padding:8px;background:rgba(10,21,32,0.5);border-radius:6px;font-size:10px;color:var(--hint);line-height:1.6">
            <strong style="color:var(--muted)">Template Excel:</strong><br>
            Cột A: tên chỉ tiêu | Cột B: giá trị (triệu đồng)<br>
            Ví dụ: "Tổng doanh thu" | 480
          </div>
        </div>

        <!-- HTKK XML import -->
        <div style="background:var(--card3);border-radius:9px;padding:14px">
          <div style="font-size:12px;font-weight:700;color:var(--gold);margin-bottom:8px">🏛 File XML từ HTKK</div>
          <div style="font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:10px">
            Upload file XML xuất từ phần mềm HTKK (tờ khai 01/CNKD).
            Tự động điền doanh thu và số thuế.
          </div>
          <input type="file" id="xml-file" accept=".xml" style="display:none" onchange="handleXmlUpload(this)">
          <button onclick="document.getElementById('xml-file').click()"
            style="width:100%;padding:8px;border-radius:6px;border:1px dashed rgba(45,212,191,0.4);background:transparent;color:#2DD4BF;font-size:12px;cursor:pointer;font-family:inherit">
            Chọn file XML (HTKK)
          </button>
          <div id="xml-result" style="margin-top:8px;font-size:11px;color:var(--muted)"></div>
          <div style="margin-top:10px;padding:8px;background:rgba(10,21,32,0.5);border-radius:6px;font-size:10px;color:var(--hint);line-height:1.6">
            <strong style="color:var(--muted)">Cách xuất file XML:</strong><br>
            HTKK → Kê khai → 01/CNKD → Kết xuất XML
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function handleExcelUpload(input) {
  if(!input.files[0]) return;
  const resultEl = document.getElementById('excel-result');
  resultEl.innerHTML = '<span style="color:var(--warn)">⏳ Đang đọc file...</span>';

  /* Thử backend trước nếu đã đăng nhập */
  if(isLoggedIn()) {
    importExcelRemote(input.files[0]).then(mapped => {
      if(mapped) {
        let filled=0;
        Object.entries(mapped.revenue||{}).forEach(([k,v])=>{if(v){data.revenue[k]=v;filled++;}});
        Object.entries(mapped.expenses||{}).forEach(([k,v])=>{if(v){data.expenses[k]=v;filled++;}});
        Object.entries(mapped.assets||{}).forEach(([k,v])=>{if(v){data.assets[k]=v;filled++;}});
        if(filled>0){
          resultEl.innerHTML='<span style="color:var(--safe)">✓ Server đã đọc '+filled+' trường từ Excel.</span>';
          renderCurrentStep();
          return;
        }
      }
      /* Fallback to client-side parse */
      runClientExcelParse(input.files[0], resultEl);
    }).catch(()=>runClientExcelParse(input.files[0], resultEl));
    return;
  }
  runClientExcelParse(input.files[0], resultEl);
}
function runClientExcelParse(file, resultEl) {
  parseExcelFile(file, (err, rows) => {
    if(err) { resultEl.innerHTML = '<span style="color:var(--danger)">❌ Lỗi: '+err+'</span>'; return; }
    const mapped = mapExcelToData(rows);
    let filled = 0;

    Object.entries(mapped.revenue).forEach(([k,v])=>{ if(v){ data.revenue[k]=v; filled++; }});
    Object.entries(mapped.expenses).forEach(([k,v])=>{ if(v){ data.expenses[k]=v; filled++; }});
    Object.entries(mapped.assets).forEach(([k,v])=>{ if(v){ data.assets[k]=v; filled++; }});

    if(filled === 0) {
      resultEl.innerHTML = '<span style="color:var(--warn)">⚠️ Không nhận diện được cột. Kiểm tra tên cột tiếng Việt.</span>';
      return;
    }
    resultEl.innerHTML = '<span style="color:var(--safe)">✓ Đã điền '+filled+' trường từ file Excel.</span>';
    renderCurrentStep();
    setTimeout(()=>{ const el=document.getElementById('import-body'); if(el) el.style.display='none'; }, 1500);
  });
}

function handleXmlUpload(input) {
  if(!input.files[0]) return;
  const resultEl = document.getElementById('xml-result');
  resultEl.innerHTML = '<span style="color:var(--warn)">⏳ Đang phân tích XML...</span>';
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const parsed = parseHTKKXml(e.target.result);
      let msg = [];

      if(parsed.doanhThu > 0) {
        data.revenue.tongDoanhThu = parsed.doanhThu;
        msg.push('Doanh thu: ₫'+parsed.doanhThu+' triệu');
      }
      if(parsed.tongThue > 0) {
        data.expenses.thueNopTrongKy = parsed.tongThue;
        msg.push('Thuế: ₫'+parsed.tongThue+' triệu');
      }
      if(parsed.tenHKD) {
        data.info.name = parsed.tenHKD;
        msg.push('Tên HKD: '+parsed.tenHKD);
      }

      if(msg.length === 0) {
        resultEl.innerHTML = '<span style="color:var(--warn)">⚠️ Không đọc được dữ liệu. Đảm bảo file là XML xuất từ HTKK mẫu 01/CNKD.</span>';
        return;
      }
      resultEl.innerHTML = '<span style="color:var(--safe)">✓ Đã đọc: '+msg.join(' · ')+'</span>';
      renderCurrentStep();
      setTimeout(()=>{ const el=document.getElementById('import-body'); if(el) el.style.display='none'; }, 2000);
    } catch(err) {
      resultEl.innerHTML = '<span style="color:var(--danger)">❌ File XML không hợp lệ: '+err.message+'</span>';
    }
  };
  reader.readAsText(input.files[0], 'utf-8');
}


function buildAIPrompt(res) {
  const {ratios,summary}=res;
  const ind=INDUSTRIES[data.info.industry];
  const dList=METRICS_DEF.filter(m=>classify(ratios[m.key],m.thresholds,m.inverse)==='danger').map(m=>`${m.label}: ${m.format(ratios[m.key])}`).join(', ')||'Không có';
  const wList=METRICS_DEF.filter(m=>classify(ratios[m.key],m.thresholds,m.inverse)==='warn').map(m=>`${m.label}: ${m.format(ratios[m.key])}`).join(', ')||'Không có';
  return `Bạn là chuyên gia tư vấn tài chính cho hộ kinh doanh Việt Nam. Phân tích ngắn gọn, thực tế.
HKD: ${data.info.name||'Không cung cấp'} | Ngành: ${ind.label}
DT năm: ${fmt(summary.dtNam)} triệu | LN ròng: ${fmt(summary.lnRong)} triệu | Tổng nợ: ${fmt(summary.tongNo)} triệu
Chỉ số nguy cơ cao: ${dList}
Chỉ số cần cải thiện: ${wList}
Điểm sức khỏe: ${scoreAll(ratios)}/100
Viết phân tích 250–350 từ bằng tiếng Việt: (1) Nhận xét tổng quan, (2) 3 điểm mạnh, (3) 3 rủi ro cần xử lý ngay, (4) Khuyến nghị chiến lược cụ thể cho quy mô HKD nhỏ tại Việt Nam 2026.`;
}

async function fetchAIWithFallback(prompt, analysisId) {
  /* Thử backend trước (an toàn hơn, key không lộ) */
  if (isLoggedIn()) {
    const result = await fetchAIRemote(prompt, analysisId);
    if (result) return result;
  }
  /* Fallback: gọi trực tiếp nếu có LOCAL_API_KEY */
  if (typeof LOCAL_API_KEY !== 'undefined' && LOCAL_API_KEY.trim()) {
    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':LOCAL_API_KEY.trim()},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
      });
      if (resp.ok) { const d=await resp.json(); return d.content?.[0]?.text||''; }
    } catch {}
  }
  return '⚠️ Tính năng AI cần đăng nhập hoặc cấu hình API key. Xem tab "Chỉ số" để xem kết quả phân tích chi tiết.';
}

/* ══════════════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════════════ */
function updateStepper(step){
  for(let i=0;i<5;i++){
    const d=document.getElementById('step-dot-'+i);
    if(!d)continue;
    d.classList.remove('active','done');
    if(i<step)d.classList.add('done');
    else if(i===step)d.classList.add('active');
  }
}

function renderCurrentStep(){
  const el=document.getElementById('main-content');
  updateStepper(currentStep);
  if(currentStep===0)      el.innerHTML=renderStep0();
  else if(currentStep===1) el.innerHTML=renderStep1();
  else if(currentStep===2) el.innerHTML=renderStep2();
  else if(currentStep===3) el.innerHTML=renderStep3();
  else if(currentStep===4){
    const res=calculate();
    const snap=saveSnapshot(res);
    el.innerHTML=renderStep4(res);
    /* Save to server if logged in */
    if(snap && isLoggedIn()) {
      (async () => {
        /* Tự tạo HKD profile nếu chưa có */
        if (!authState.activeHkdId && data.info.name) {
          try {
            const cr = await apiFetch('/api/hkd', {
              method: 'POST',
              body: JSON.stringify({
                name:     data.info.name,
                industry: data.info.industry || 'thuong_mai',
                size:     data.info.size     || 'sieu_nho',
                region:   data.info.region   || 'tinh_lon',
                province: data.info.province || '',
                duration: data.info.duration || ''
              })
            });
            if (cr.ok) {
              const { profile } = await cr.json();
              authState.activeHkdId = profile.id;
              localStorage.setItem('hkd_active_id', profile.id);
              authState.hkdProfiles.push(profile);
            }
          } catch(e) { console.warn('Tạo HKD profile thất bại:', e); }
        }
        if (authState.activeHkdId) {
          const id = await saveSnapshotRemote(snap, authState.activeHkdId);
          if(id) snap._serverId = id;
        }
      })();
    }
    /* AI tư vấn: dùng backend proxy khi đã đăng nhập */
    const hist = loadHistory();
    const lastSnap = hist[0];
    const serverId = lastSnap?._serverId || '';
    const aiPrompt = buildAIPrompt(res);
    fetchAIWithFallback(aiPrompt, serverId).then(txt=>{
      const aiEl=document.getElementById('ai-content');
      const pulse=document.getElementById('ai-pulse');
      if(aiEl) aiEl.textContent = txt || '';
      if(pulse) pulse.style.animationPlayState='paused';
    });
    // fetchAI(res).then(txt=>{ ... });
  }
  window.scrollTo({top:0,behavior:'smooth'});
  if(currentStep===0)renderIndustrySummary();
  if(currentStep===1)updateRevCalc();
}

function nextStep(){if(currentStep<4){currentStep++;renderCurrentStep();}}
function prevStep(){if(currentStep>0){currentStep--;renderCurrentStep();}}
function goToStep(s){if(s<=currentStep||currentStep>=4){currentStep=s;renderCurrentStep();}}
function runAnalysis(){currentStep=4;renderCurrentStep();}

// Init
renderCurrentStep();
/* Render user chip after DOM ready */
setTimeout(()=>{
  updateHeaderUserChip();
  if(isLoggedIn()) loadHkdProfiles();
}, 50);
</script>
